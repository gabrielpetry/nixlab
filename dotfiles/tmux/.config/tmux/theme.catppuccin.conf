# vim: ft=tmux
# Standalone Catppuccin Mocha theme for tmux.
# This file can be sourced directly by tmux.

# Catppuccin Mocha palette
%hidden CATPPUCCIN_ROSEWATER="#[fg=#f5e0dc]"
%hidden CATPPUCCIN_FLAMINGO="#[fg=#f2cdcd]"
%hidden CATPPUCCIN_PINK="#[fg=#f5c2e7]"
%hidden CATPPUCCIN_MAUVE="#[fg=#cba6f7]"
%hidden CATPPUCCIN_RED="#[fg=#f38ba8]"
%hidden CATPPUCCIN_MAROON="#[fg=#eba0ac]"
%hidden CATPPUCCIN_PEACH="#[fg=#fab387]"
%hidden CATPPUCCIN_YELLOW="#[fg=#f9e2af]"
%hidden CATPPUCCIN_GREEN="#[fg=#a6e3a1]"
%hidden CATPPUCCIN_TEAL="#[fg=#94e2d5]"
%hidden CATPPUCCIN_SKY="#[fg=#89dceb]"
%hidden CATPPUCCIN_SAPPHIRE="#[fg=#74c7ec]"
%hidden CATPPUCCIN_BLUE="#[fg=#89b4fa]"
%hidden CATPPUCCIN_LAVENDER="#[fg=#b4befe]"
%hidden CATPPUCCIN_TEXT="#[fg=#cdd6f4]"
%hidden CATPPUCCIN_SUBTEXT1="#[fg=#bac2de]"
%hidden CATPPUCCIN_SUBTEXT0="#[fg=#a6adc8]"
%hidden CATPPUCCIN_OVERLAY2="#[fg=#9399b2]"
%hidden CATPPUCCIN_OVERLAY1="#[fg=#7f849c]"
%hidden CATPPUCCIN_OVERLAY0="#[fg=#6c7086]"
%hidden CATPPUCCIN_SURFACE2="#[fg=#585b70]"
%hidden CATPPUCCIN_SURFACE1="#[fg=#45475a]"
%hidden CATPPUCCIN_SURFACE0="#[fg=#313244]"
%hidden CATPPUCCIN_BASE="#[fg=#1e1e2e]"
%hidden CATPPUCCIN_MANTLE="#[fg=#181825]"
%hidden CATPPUCCIN_CRUST="#[fg=#11111b]"

# Base UI
set -g status on
set -g status-interval 5
set -g status-style "fg=#cdd6f4,bg=#1e1e2e"
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g display-panes-colour "#89b4fa"
set -g display-panes-active-colour "#f9e2af"
set -g clock-mode-colour "#89b4fa"
set -g mode-style "fg=#1e1e2e,bg=#89b4fa,bold"

# Windows
setw -g window-status-separator ""
setw -g window-status-style "fg=#a6adc8,bg=#1e1e2e"
setw -g window-status-format "#[fg=#cdd6f4,bg=#45475a] #I:#W#{?window_flags, #{window_flags}, }"
setw -g window-status-current-style "fg=#1e1e2e,bg=#89b4fa,bold"
setw -g window-status-current-format "#[fg=#1e1e2e,bg=#89b4fa,bold] #I:#W#{?window_flags, #{window_flags}, }"
setw -g window-status-activity-style "fg=#fab387,bg=#1e1e2e"
setw -g window-status-bell-style "fg=#1e1e2e,bg=#f38ba8,bold"

# Status line
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold] #S "
set -g status-right "#[fg=#cdd6f4,bg=#45475a] %Y-%m-%d #[fg=#cdd6f4,bg=#313244] %H:%M #[fg=#1e1e2e,bg=#89b4fa,bold] #H "

# Copy mode / menus
set -g menu-style "fg=#cdd6f4,bg=#1e1e2e"
set -g menu-selected-style "fg=#1e1e2e,bg=#89b4fa,bold"
set -g menu-border-style "fg=#89b4fa"
set -g popup-style "fg=#cdd6f4,bg=#1e1e2e"
set -g popup-border-style "fg=#89b4fa"
